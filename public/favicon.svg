<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16a34a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 12 dots representing 12 letters of "Pavan Adhitya Bollam" arranged in a circle -->
  <g filter="url(#glow)">
    <circle cx="50" cy="15" r="6" fill="url(#gradient)" />
    <circle cx="65" cy="20" r="6" fill="url(#gradient)" />
    <circle cx="77" cy="32" r="6" fill="url(#gradient)" />
    <circle cx="85" cy="50" r="6" fill="url(#gradient)" />
    <circle cx="77" cy="68" r="6" fill="url(#gradient)" />
    <circle cx="65" cy="80" r="6" fill="url(#gradient)" />
    <circle cx="50" cy="85" r="6" fill="url(#gradient)" />
    <circle cx="35" cy="80" r="6" fill="url(#gradient)" />
    <circle cx="23" cy="68" r="6" fill="url(#gradient)" />
    <circle cx="15" cy="50" r="6" fill="url(#gradient)" />
    <circle cx="23" cy="32" r="6" fill="url(#gradient)" />
    <circle cx="35" cy="20" r="6" fill="url(#gradient)" />
  </g>
  <!-- Center initial -->
  <text x="50" y="58" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="url(#gradient)" text-anchor="middle">P</text>
</svg>
